[build]
command = "echo 'Files already generated by GitHub Actions'"
publish = "."
  # Skip build when only docs/workflow/script-only paths changed (Netlify credit hygiene, 2026-05-07).
  # If a skip looks wrong, push an empty commit: git commit --allow-empty -m "trigger preview" && git push
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- ':(exclude)*.md' ':(exclude).github/**' ':(exclude)scripts/**' ':(exclude).claude/**' ':(exclude)docs/**' ':(exclude)*.py'"

# Skip processing since files are pre-built
[build.processing]
skip_processing = false

[build.environment]
PYTHON_VERSION = "3.13" 